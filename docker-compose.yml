version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: veritas-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-veritas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veritas_secret}
      POSTGRES_DB: ${DB_NAME:-veritas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-veritas} -d ${DB_NAME:-veritas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veritas-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: veritas-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veritas-network

  # Veritas API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: veritas-api
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-veritas}:${DB_PASSWORD:-veritas_secret}@postgres:5432/${DB_NAME:-veritas}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Application
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      
      # API Keys (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      
      # Search providers (optional)
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
      
      # Session config
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      CACHE_TTL_MINUTES: ${CACHE_TTL_MINUTES:-60}
      
      # Billing (Razorpay - India only)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      
      # Security
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-100}
      MAX_CONCURRENT_WORKERS: ${MAX_CONCURRENT_WORKERS:-50}
      
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - veritas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Prisma Studio for database management
  # Uncomment to enable
  # prisma-studio:
  #   image: node:22-alpine
  #   container_name: veritas-prisma-studio
  #   working_dir: /app
  #   command: sh -c "npx prisma studio --port 5555 --browser none"
  #   environment:
  #     DATABASE_URL: postgresql://${DB_USER:-veritas}:${DB_PASSWORD:-veritas_secret}@postgres:5432/${DB_NAME:-veritas}
  #   volumes:
  #     - ./prisma:/app/prisma:ro
  #     - ./package.json:/app/package.json:ro
  #     - ./node_modules:/app/node_modules:ro
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - veritas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  veritas-network:
    driver: bridge
