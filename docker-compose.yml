services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: veritas-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-veritas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-veritas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-veritas} -d ${DB_NAME:-veritas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veritas-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: veritas-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - sh
      - -c
      - >
        redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veritas-network

  # Veritas API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: veritas-api
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-veritas}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-veritas}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379

      # Application
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}

      # API Keys (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # Search providers (required in production: set Tavily or Exa)
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}

      # Session config
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      CACHE_TTL_MINUTES: ${CACHE_TTL_MINUTES:-60}

      # Billing (Razorpay - India only)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}

      # Security
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-100}
      MAX_PREAUTH_REQUESTS_PER_MINUTE: ${MAX_PREAUTH_REQUESTS_PER_MINUTE:-100}
      MAX_AUTHENTICATED_REQUESTS_PER_MINUTE: ${MAX_AUTHENTICATED_REQUESTS_PER_MINUTE:-100}
      MAX_CONCURRENT_WORKERS: ${MAX_CONCURRENT_WORKERS:-50}
      DISABLE_RESEARCH_WORKER: ${DISABLE_RESEARCH_WORKER:-false}

    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - veritas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional standalone research worker. Enable with:
  # docker compose -f docker-compose.yml --profile worker up -d --build
  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: production
    container_name: veritas-worker
    environment:
      DATABASE_URL: postgresql://${DB_USER:-veritas}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-veritas}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      CACHE_TTL_MINUTES: ${CACHE_TTL_MINUTES:-60}
      MAX_CONCURRENT_WORKERS: ${MAX_CONCURRENT_WORKERS:-50}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - veritas-network
    restart: unless-stopped

  # Optional: Prisma Studio for database management
  # Uncomment to enable
  # prisma-studio:
  #   image: node:22-alpine
  #   container_name: veritas-prisma-studio
  #   working_dir: /app
  #   command: sh -c "npx prisma studio --port 5555 --browser none"
  #   environment:
  #     DATABASE_URL: postgresql://${DB_USER:-veritas}:${DB_PASSWORD:-veritas_secret}@postgres:5432/${DB_NAME:-veritas}
  #   volumes:
  #     - ./prisma:/app/prisma:ro
  #     - ./package.json:/app/package.json:ro
  #     - ./node_modules:/app/node_modules:ro
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - veritas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  veritas-network:
    driver: bridge
